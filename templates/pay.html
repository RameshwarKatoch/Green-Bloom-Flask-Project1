<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Payment - Green Bloom</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f4; }
        .box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: inline-block; }
        h2 { color: #8B4513; }
        p { margin-bottom: 20px; font-size: 1.1rem; }
        .btn { background: #8B4513; color: white; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 5px; cursor: pointer; }
    
/* --- User Dropdown Styles --- */
.user-dropdown {
    position: relative;
    display: inline-block;
    margin-left: 25px;
}
.user-dropdown .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    color: var(--dark-grey, #5C4033);
    transition: color 0.3s ease;
}
.user-dropdown .icon-btn:hover {
    color: var(--primary-green, #8B4513);
}
.dropdown-content {
    display: none;
    position: absolute;
    right: 0;
    top: 30px;
    background-color: #fff;
    min-width: 160px;
    box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.1);
    z-index: 1000;
    border-radius: 8px;
    overflow: hidden;
}
.dropdown-content a, .dropdown-header {
    color: #333;
    padding: 12px 16px;
    text-decoration: none;
    display: block;
    font-size: 0.9rem;
    font-weight: 500;
}
.dropdown-header {
    background-color: #fafafa;
    border-bottom: 1px solid #eee;
    color: #8B4513;
    cursor: default;
}
.dropdown-content a:hover {
    background-color: #f1f1f1;
}
/* .user-dropdown:hover .dropdown-content removed for click usage */

    
.dropdown-content.show {
    display: block !important;
}

    
        /* --- Mobile Responsive Styles --- */
        @media (max-width: 768px) {
            .main-nav { flex-direction: column; gap: 15px; }
            .nav-links { display: flex; flex-wrap: wrap; justify-content: center; padding: 0; margin: 10px 0; }
            .nav-links li { margin: 5px 10px; }
            .nav-icons { margin-top: 10px; justify-content: center; width: 100%; flex-wrap: wrap; gap: 10px; }
            .user-dropdown { margin-left: 10px; }
            .nav-icons a { margin-left: 10px; }
            .nav-search-form .search-input { width: 140px; }
            .nav-search-form .search-input:focus { width: 180px; }
            .hero-content h1 { font-size: 2.2rem; }
            .category-container, .footer-container { grid-template-columns: 1fr; }
            .footer-column { text-align: center; margin-bottom: 10px; }
            .cart-item { flex-direction: column; align-items: flex-start; }
            .cart-item-img { width: 100%; height: auto; max-height: 200px; }
            .remove-btn { margin-left: 0; margin-top: 15px; }
            .cart-item-quantity { margin-top: 10px; }
            .chatbot-container { width: 90vw; right: 5vw; bottom: 90px; }
            .auth-container { width: 95%; margin: 40px auto; padding: 20px; }
        }
    </style>


    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
</head>
<body>
    <div class="box">
        <h2>Completing Payment...</h2>
        <p>Order ID: #{{ order.id }}</p>
        <p>Amount: ₹{{ order.total_price }}</p>
        
        <button id="rzp-button1" class="btn">Click here to Pay Now</button>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        var options = {
            "key": "{{ razorpay_key_id }}", 
            "amount": "{{ amount }}", 
            "currency": "INR",
            "name": "Green Bloom",
            "description": "Plant Order Payment",
            "order_id": "{{ razorpay_order_id }}", 
            "handler": function (response){
                // Submit success details to our backend
                var form = document.createElement("form");
                form.action = "{{ url_for('payment_success') }}";
                form.method = "POST";
                
                var input1 = document.createElement("input");
                input1.type = "hidden";
                input1.name = "razorpay_payment_id";
                input1.value = response.razorpay_payment_id;
                form.appendChild(input1);
                
                var input2 = document.createElement("input");
                input2.type = "hidden";
                input2.name = "razorpay_order_id";
                input2.value = response.razorpay_order_id;
                form.appendChild(input2);
                
                var input3 = document.createElement("input");
                input3.type = "hidden";
                input3.name = "razorpay_signature";
                input3.value = response.razorpay_signature;
                form.appendChild(input3);
                
                document.body.appendChild(form);
                form.submit();
            },
            "prefill": {
                "name": "{{ order.full_name }}",
                "email": "{{ current_user.username }}", 
                "contact": "{{ order.phone }}"
            },
            "theme": {
                "color": "#8B4513"
            }
        };
        var rzp1 = new Razorpay(options);
        
        // Open payment automatically or on click
        document.getElementById('rzp-button1').onclick = function(e){
            rzp1.open();
            e.preventDefault();
        }
        
        // Auto-click to make it smoother
        window.onload = function() {
            document.getElementById('rzp-button1').click();
        };
    </script>
<!-- Chatbot UI -->
    <button class="chatbot-toggler" id="chatbot-toggler" aria-label="Open Chat">
        <i class="fa-solid fa-message"></i>
    </button>
    
    <div class="chatbot-container" id="chatbot-container">
        <div class="chatbot-header">
            <h3><i class="fa-solid fa-leaf" style="margin-right: 8px;"></i> Green Bloom Bot</h3>
            <button class="chatbot-close" id="chatbot-close"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="chatbot-messages" id="chatbot-messages">
            <div class="chat-msg bot">Hello! How can I help you today?</div>
        </div>
        <div class="chatbot-input">
            <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
            <button id="chat-send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const toggler = document.getElementById('chatbot-toggler');
        const container = document.getElementById('chatbot-container');
        const closeBtn = document.getElementById('chatbot-close');
        const sendBtn = document.getElementById('chat-send');
        const chatInput = document.getElementById('chat-input');
        const messagesDiv = document.getElementById('chatbot-messages');

        toggler.addEventListener('click', () => {
            container.classList.add('active');
            chatInput.focus();
        });

        closeBtn.addEventListener('click', () => {
            container.classList.remove('active');
        });

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('chat-msg', sender);
            msgDiv.innerText = text;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function chatAddToCart(productId, btn) {
            btn.disabled = true;
            btn.textContent = 'Adding...';
            try {
                const response = await fetch('/add_to_cart/' + productId, {
                    method: 'POST',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
                if (response.redirected) {
                    addMessage('Please log in first to add items to your cart!', 'bot');
                    btn.textContent = 'Add to Cart';
                    btn.disabled = false;
                    return;
                }
                const result = await response.json();
                btn.classList.add('added');
                btn.textContent = '\u2713 Added!';
                const badge = document.querySelector('.cart-count');
                if (badge) {
                    badge.textContent = result.cart_count;
                } else {
                    const cartLink = document.querySelector('.cart-link');
                    if (cartLink) {
                        const b = document.createElement('span');
                        b.classList.add('cart-count');
                        b.textContent = result.cart_count;
                        cartLink.appendChild(b);
                    }
                }
                setTimeout(function() { btn.classList.remove('added'); btn.textContent = 'Add to Cart'; btn.disabled = false; }, 2000);
            } catch (err) {
                btn.textContent = 'Add to Cart';
                btn.disabled = false;
            }
        }

        function addProductCards(products) {
            if (!products || products.length === 0) return;
            const list = document.createElement('div');
            list.classList.add('chat-product-list');
            products.forEach(function(p) {
                const item = document.createElement('div');
                item.classList.add('chat-product-item');
                const imgSrc = p.image_url || '';
                const imgTag = imgSrc ? '<img src="' + imgSrc + '" alt="' + p.name + '">' : '';
                item.innerHTML = imgTag +
                    '<div class="cp-details">' +
                    '<div class="cp-name"><a href="/product/' + p.id + '">' + p.name + '</a></div>' +
                    '<div class="cp-price">\u20b9' + p.price.toLocaleString('en-IN') + '</div>' +
                    '</div>' +
                    '<button class="cp-cart-btn" onclick="chatAddToCart(' + p.id + ', this)">Add to Cart</button>';
                list.appendChild(item);
            });
            messagesDiv.appendChild(list);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTypingIndicator() {
            const typing = document.createElement('div');
            typing.classList.add('chat-typing');
            typing.id = 'typing-indicator';
            typing.innerHTML = '<span></span><span></span><span></span>';
            messagesDiv.appendChild(typing);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            chatInput.value = '';
            sendBtn.disabled = true;

            showTypingIndicator();

            try {
                const response = await fetch('/chatbot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                removeTypingIndicator();
                addMessage(data.reply, 'bot');
                addProductCards(data.products);
            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator();
                addMessage("Sorry, I'm having trouble connecting to the server.", 'bot');
            } finally {
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // --- Search Autocomplete Script ---
        const searchInputElem = document.getElementById('search-input');
        const suggestionsBox = document.getElementById('search-suggestions');
        let searchTimeout = null;

        searchInputElem.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            const query = searchInputElem.value.trim();
            
            if (!query) {
                suggestionsBox.classList.remove('active');
                return;
            }

            // Wait 300ms after user stops typing before calling the DB
            searchTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`/autocomplete?q=${encodeURIComponent(query)}`);
                    const data = await response.json();
                    
                    if (data.suggestions && data.suggestions.length > 0) {
                        suggestionsBox.innerHTML = data.suggestions.map(
                            s => `<a href="/product/${s.id}" class="suggestion-element"><i class="fa-solid fa-seedling" style="margin-right:8px;color: #8B4513;"></i> ${s.name}</a>`
                        ).join('');
                        suggestionsBox.classList.add('active');
                    } else {
                        suggestionsBox.classList.remove('active');
                    }
                } catch (error) {
                    console.error('Search API Error:', error);
                }
            }, 300);
        });

        // Hide suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!document.getElementById('search-form').contains(e.target)) {
                suggestionsBox.classList.remove('active');
            }
        });
    </script>


<script>
    function toggleUserDropdown() {
        var dropdown = document.querySelector(".dropdown-content");
        if(dropdown) {
            dropdown.classList.toggle("show");
        }
    }
    
    // Close the dropdown if the user clicks outside of it
    window.onclick = function(event) {
        if (!event.target.closest('.user-dropdown')) {
            var dropdowns = document.getElementsByClassName("dropdown-content");
            for (var i = 0; i < dropdowns.length; i++) {
                var openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                }
            }
        }
    }
</script>

</body>
</html>
